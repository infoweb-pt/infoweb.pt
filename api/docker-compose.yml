version: "3.9"

networks:
  infoweb:
    driver: bridge

volumes:
  postgres_data:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-infoweb}
      POSTGRES_USER: ${DB_USER:-infoweb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - infoweb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-infoweb} -d ${DB_NAME:-infoweb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8123:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - infoweb
