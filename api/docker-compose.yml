networks:
  infoweb:
    driver: bridge

volumes:
  postgres_data:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-infoweb}
      POSTGRES_USER: ${DB_USER:-infoweb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - infoweb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-infoweb} -d ${DB_NAME:-infoweb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DATABASE_URL: ${DATABASE_URL:-postgres://infoweb:changeme@db:5432/infoweb}
      DB_NAME: ${DB_NAME:-infoweb}
      DB_USER: ${DB_USER:-infoweb}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-False}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    ports:
      - "8123:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - infoweb
